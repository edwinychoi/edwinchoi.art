<!DOCTYPE html>
<html lang="en" class="fonts-loading">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edwin Choi</title>
  <style>
    html,
    body {
      margin: 0;
      background: #ffffff;
    }

    #viewport {
      visibility: hidden;
    }

    html.app-ready #viewport {
      visibility: visible;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=block" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      function markFontsReady() {
        document.documentElement.classList.remove("fonts-loading");
        document.documentElement.classList.add("fonts-ready");
      }

      if (!document.fonts) {
        markFontsReady();
        return;
      }

      Promise.race([
        document.fonts.load('300 italic 16px "Cormorant Garamond"'),
        new Promise(function (resolve) { setTimeout(resolve, 2000); }),
      ]).then(markFontsReady);
    })();
  </script>
</head>
<body>
  <div id="viewport">
    <div id="board">
      <div id="image-layer" aria-hidden="true"></div>
      <div id="center-panel">
        <div id="text-stack" class="text-stack">
          <nav id="nav" aria-label="Sections">
            <button type="button" class="nav-btn active" data-section="who">Who</button>
            <span class="nav-dot" aria-hidden="true">·</span>
            <button type="button" class="nav-btn" data-section="what">What</button>
            <span class="nav-dot" aria-hidden="true">·</span>
            <button type="button" class="nav-btn" data-section="why">Why</button>
          </nav>
          <div id="content-area"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Process">
    <div class="lightbox__content"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
